name: Deploy to AWS ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: me-central-1
      ACCOUNT_ID: "440946410696"
      ECR_REPO: "kodynex-backend"
      CLUSTER: "kodynex-cluster"
      SERVICE: "kodynex-api-service-o9yrg1gg"
      CONTAINER_NAME: "kodynex-backend"
      CODECOMMIT_REPO: "kodynex"
      CODECOMMIT_BRANCH: "main"

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS creds (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::440946410696:role/github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure CodeCommit credential helper
        run: |
          git config --global credential.helper '!aws codecommit credential-helper $@'
          git config --global credential.UseHttpPath true

      - name: Clone CodeCommit repo into ./app
        run: |
          git clone --branch "$CODECOMMIT_BRANCH" \
            https://git-codecommit.${AWS_REGION}.amazonaws.com/v1/repos/${CODECOMMIT_REPO} app
          ls -la app

      # ⚠️ لا نكتب أو نعدّل سكيمة Prisma هنا — نعتمد على الملفات الموجودة في المستودع.

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repo exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPO" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPO" >/dev/null

      - name: Build & tag Docker image (use Dockerfile inside app/src)
        run: |
          IMAGE="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:${{ github.sha }}"
          docker build -f app/src/Dockerfile -t "$IMAGE" app
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Push image to ECR
        run: docker push "$IMAGE"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch current task definition ARN from service
        id: cur
        run: |
          TD_ARN=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)
          echo "td_arn=$TD_ARN" >> $GITHUB_OUTPUT

      - name: Download current task definition JSON
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ steps.cur.outputs.td_arn }}" \
            --query 'taskDefinition' \
            --output json > taskdef.json

          # استخرج اسم/جروب اللوق للكونتينر الهدف لاستخدامه لاحقًا
          LOG_GROUP=$(jq -r '.containerDefinitions[] | select(.name=="'"$CONTAINER_NAME"'") | .logConfiguration.options["awslogs-group"] // empty' taskdef.json)
          echo "LOG_GROUP=$LOG_GROUP" >> $GITHUB_ENV

          echo "Container names in TD:"
          cat taskdef.json | jq -r '.containerDefinitions[].name'

      - name: Create new task definition revision with new image (preserve roles/secrets/logs)
        id: newtd
        run: |
          cat taskdef.json \
          | jq --arg IMG "$IMAGE" --arg NAME "$CONTAINER_NAME" '
              .containerDefinitions = (
                .containerDefinitions | map(
                  if .name == $NAME then .image = $IMG | . else . end
                )
              )
              | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
            ' > taskdef-new.json

          NEW_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://taskdef-new.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "arn=$NEW_TD_ARN" >> $GITHUB_OUTPUT
          echo "NEW_TD_ARN=$NEW_TD_ARN" >> $GITHUB_ENV

      - name: Get service network (subnets/sg)
        id: net
        run: |
          NET=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration')
          echo "$NET" > net.json
          SUBNETS=$(jq -r '.subnets | join(",")' net.json)
          SGS=$(jq -r '.securityGroups | join(",")' net.json)
          ASSIGN=$(jq -r '.assignPublicIp' net.json)
          echo "subnets=$SUBNETS" >> $GITHUB_OUTPUT
          echo "sgs=$SGS" >> $GITHUB_OUTPUT
          echo "assign=$ASSIGN" >> $GITHUB_OUTPUT

      # 🔎 تشخيص قبل الهجرة: تأكد من وجود prisma/schema.prisma و prisma/migrations واطبع الإصدارات
      - name: Diagnose container before migrate (RunTask)
        id: diag
        run: |
          jq -n --arg name "$CONTAINER_NAME" '{
            containerOverrides:[{
              name:$name,
              environment:[
                {name:"PRISMA_LOG_LEVEL",value:"debug"},
                {name:"RUST_LOG",value:"info"}
              ],
              command:["/bin/sh","-lc",
                "set -x; \
                 echo WORKDIR=$(pwd); \
                 node -v; npm -v; npx -v || true; \
                 ls -la; \
                 ls -la prisma || true; \
                 test -f prisma/schema.prisma && (echo \"=== schema.prisma (first 80 lines) ===\"; head -n 80 prisma/schema.prisma) || echo 'NO schema.prisma'; \
                 test -d prisma/migrations && (echo '=== migrations ==='; find prisma/migrations -maxdepth 2 -type f -name \"*.sql\" | sed 's#^# - #') || echo 'NO migrations dir'; \
                 npx prisma -v || true; \
                 echo 'DIAG DONE'"
              ]
            }]
          }' > overrides-diag.json

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --launch-type FARGATE \
            --task-definition "$NEW_TD_ARN" \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.net.outputs.subnets }}],securityGroups=[${{ steps.net.outputs.sgs }}],assignPublicIp=${{ steps.net.outputs.assign }}}" \
            --overrides file://overrides-diag.json \
            --query 'tasks[0].taskArn' --output text)

          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          DESC=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --output json)
          echo "$DESC" > task-desc-diag.json

          EXIT=$(jq -r '.tasks[0].containers[0].exitCode // "null"' task-desc-diag.json)
          STREAM=$(jq -r '.tasks[0].containers[0].logStreamName // ""' task-desc-diag.json)
          echo "Diag ExitCode: $EXIT"
          echo "Diag LogStream: $STREAM"

          if [ -n "$STREAM" ] && [ "$STREAM" != "null" ] && [ -n "${LOG_GROUP:-}" ]; then
            echo "---- CloudWatch Logs (diag tail) ----"
            aws logs get-log-events \
              --log-group-name "$LOG_GROUP" \
              --log-stream-name "$STREAM" \
              --limit 200 \
              --query 'events[].message' \
              --output text || true
            echo "--------------------------------------"
          else
            echo "No logStreamName or LOG_GROUP not set — راجع logConfiguration بالـ Task Definition."
          fi

          [ "$EXIT" = "0" ] || { echo "❌ Diagnostic task failed (exit $EXIT)"; exit 1; }

      # 🟢 الهجرة الفعلية: Prisma migrate deploy داخل شِل + لوق CloudWatch
      - name: Run Prisma migrate (RunTask)
        id: migrate
        run: |
          jq -n --arg name "$CONTAINER_NAME" '{
            containerOverrides:[{
              name:$name,
              environment:[
                {name:"PRISMA_LOG_LEVEL",value:"debug"},
                {name:"RUST_LOG",value:"info"}
              ],
              command:["/bin/sh","-lc",
                "set -e; \
                 node -v; npx prisma -v; \
                 test -d prisma/migrations || (echo \"❌ prisma/migrations not found\" && exit 1); \
                 test -f prisma/schema.prisma || (echo \"❌ prisma/schema.prisma not found\" && exit 1); \
                 npx prisma migrate deploy"
              ]
            }]
          }' > overrides.json

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --launch-type FARGATE \
            --task-definition "$NEW_TD_ARN" \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.net.outputs.subnets }}],securityGroups=[${{ steps.net.outputs.sgs }}],assignPublicIp=${{ steps.net.outputs.assign }}}" \
            --overrides file://overrides.json \
            --query 'tasks[0].taskArn' --output text)

          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          DESC=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --output json)
          echo "$DESC" > task-desc.json

          EXIT=$(jq -r '.tasks[0].containers[0].exitCode // "null"' task-desc.json)
          STOP=$(jq -r '.tasks[0].stoppedReason // ""' task-desc.json)
          STREAM=$(jq -r '.tasks[0].containers[0].logStreamName // ""' task-desc.json)
          echo "StoppedReason: $STOP"
          echo "ExitCode: $EXIT"
          echo "LogStream: $STREAM"

          if [ -n "$STREAM" ] && [ "$STREAM" != "null" ] && [ -n "${LOG_GROUP:-}" ]; then
            echo "---- CloudWatch Logs (migrate tail) ----"
            aws logs get-log-events \
              --log-group-name "$LOG_GROUP" \
              --log-stream-name "$STREAM" \
              --limit 200 \
              --query 'events[].message' \
              --output text || true
            echo "----------------------------------------"
          else
            echo "No logStreamName or LOG_GROUP not set — راجع logConfiguration بالـ Task Definition."
          fi

          if [ "$EXIT" != "0" ]; then
            echo "❌ Prisma migrate failed, exitCode=$EXIT"
            exit 1
          fi

      - name: Update ECS service to new task definition
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_TD_ARN" \
            --force-new-deployment
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"

      - name: Smoke test (/health & /db-health)
        run: |
          TASK=$(aws ecs list-tasks --cluster "$CLUSTER" --service-name "$SERVICE" --desired-status RUNNING --query 'taskArns[0]' --output text)
          ENI=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK" \
            --query "tasks[0].attachments[?type=='ElasticNetworkInterface'].details[?name=='networkInterfaceId'].value" --output text)
          IP=$(aws ec2 describe-network-interfaces --network-interface-ids "$ENI" --query 'NetworkInterfaces[0].Association.PublicIp' --output text)
          echo "Public IP: $IP"
          curl -fsS "http://$IP:3000/health"
          curl -fsS "http://$IP:3000/db-health"
