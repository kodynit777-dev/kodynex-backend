name: Deploy to AWS ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: me-central-1
      ACCOUNT_ID: "440946410696"
      ECR_REPO: "kodynex-backend"
      CLUSTER: "kodynex-cluster"
      SERVICE: "kodynex-api-service-o9yrg1gg"
      CONTAINER_NAME: "kodynex-backend"
      CODECOMMIT_REPO: "kodynex"
      CODECOMMIT_BRANCH: "main"

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS creds (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::440946410696:role/github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure CodeCommit credential helper
        run: |
          git config --global credential.helper '!aws codecommit credential-helper $@'
          git config --global credential.UseHttpPath true

      - name: Clone CodeCommit repo into ./app
        run: |
          git clone --branch "$CODECOMMIT_BRANCH" \
            https://git-codecommit.${AWS_REGION}.amazonaws.com/v1/repos/${CODECOMMIT_REPO} app
          ls -la app

      # 🔧 Hotfix: اكتب سكيمة Prisma نظيفة داخل بيئة العداء قبل البناء
      - name: Normalize prisma schema (hotfix)
        run: |
          mkdir -p app/prisma
          cat > app/prisma/schema.prisma <<'EOF'
          generator client {
            provider = "prisma-client-js"
          }

          datasource db {
            provider = "postgresql"
            url      = env("DATABASE_URL")
          }
          EOF
          echo "=== final schema ==="
          cat app/prisma/schema.prisma

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repo exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPO" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPO" >/dev/null

      - name: Build & tag Docker image
        run: |
          IMAGE="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:${{ github.sha }}"
          docker build -f app/src/Dockerfile -t "$IMAGE" app
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Push image to ECR
        run: docker push "$IMAGE"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch current task definition ARN from service
        run: |
          aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text > taskdef_arn.txt

      - name: Download current task definition JSON
        run: |
          aws ecs describe-task-definition \
            --task-definition "$(cat taskdef_arn.txt)" \
            --query 'taskDefinition' \
            --output json > taskdef.json
          cat taskdef.json | jq '.containerDefinitions[].name'

      - name: Create new task definition revision with new image
        run: |
          cat taskdef.json \
          | jq --arg IMG "$IMAGE" --arg NAME "$CONTAINER_NAME" '
              .containerDefinitions = (
                .containerDefinitions | map(
                  if .name == $NAME then .image = $IMG | . else . end
                )
              )
              | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
          > taskdef-new.json

          aws ecs register-task-definition \
            --cli-input-json file://taskdef-new.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text > new_taskdef_arn.txt

          echo "NEW_TD_ARN=$(cat new_taskdef_arn.txt)" >> $GITHUB_ENV

      - name: Update ECS service to new task definition
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_TD_ARN" \
            --force-new-deployment

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE"
